<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<title>Hyderabad Sonic Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>

body{
margin:0;
display:flex;
height:100vh;
font-family:Arial;
}

#map{
width:60%;
height:100%;
}

#sidebar{
width:40%;
padding:20px;
overflow-y:auto;
box-sizing:border-box;
background:#f8f8f8;
}

img{
width:100%;
margin-bottom:10px;
border-radius:10px;
}

audio{
width:100%;
margin-bottom:20px;
}

h2{
margin-top:0;
}

</style>

</head>

<body>

<div id="map"></div>

<div id="sidebar">

<h2>Listening to Urban Transformation</h2>

<p>
How does sound change across Hyderabad's rapidly developing urban corridor between Kokapet and the Financial District?
</p>

<p>
Click a marker to explore the location.
</p>

<div id="content"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script>

var map = L.map('map').setView([17.414,78.339], 14);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution: '&copy; OpenStreetMap contributors'
}
).addTo(map);



// CUSTOM ICONS

const corporateIcon = L.icon({
iconUrl: 'pin-icons/corporate-icon.png',
iconSize: [42,42],
iconAnchor: [21,21]
});

const lakeIcon = L.icon({
iconUrl: 'pin-icons/lake-icon.png',
iconSize: [42,42],
iconAnchor: [21,21]
});

const teaIcon = L.icon({
iconUrl: 'pin-icons/teastall-icon.png',
iconSize: [42,42],
iconAnchor: [21,21]
});

const constructionIcon = L.icon({
iconUrl: 'pin-icons/construction-icon.png',
iconSize: [42,42],
iconAnchor: [21,21]
});

const gaushalaIcon = L.icon({
iconUrl: 'pin-icons/gaushala-icon.png',
iconSize: [42,42],
iconAnchor: [21,21]
});



// WIPRO GATE

var wiproGate = L.marker(
[17.427228, 78.341653],
{icon: corporateIcon}
).addTo(map);

wiproGate.bindTooltip("Wipro Gate");

wiproGate.on('click', function(){

map.flyTo([17.427228, 78.341653], 16);

document.getElementById('content').innerHTML = `

<h2>Wipro Gate</h2>

<audio controls>
<source src="audio/1. WiproGate.mp3">
</audio>

<img src="images/WiproGate3.jpeg">
<img src="images/WiproGate2.jpeg">

<p>
The gate exists because the Financial District is built around controlled access. Unlike older parts of Hyderabad where streets, shops, and public life blur together, corporate campuses separate who belongs inside from who remains outside. The soundscape is dominated by movement and coordination. Conversations are brief and functional, while vehicle sounds remain constant throughout.</p>

`;

});



// WIPRO LAKE

var wiproLake = L.marker(
[17.424922, 78.342108],
{icon: lakeIcon}
).addTo(map);

wiproLake.bindTooltip("Wipro Lake");

wiproLake.on('click', function(){

map.flyTo([17.424922, 78.342108], 16);

document.getElementById('content').innerHTML = `

<h2>Wipro Lake</h2>

<audio controls>
<source src="audio/WiproLakee.mp3">
</audio>

<img src="images/WiproLake1.jpeg">
<img src="images/WiproLake2.jpeg">
<img src="images/WiproLake3.jpeg">
<img src="images/WiproLake4.jpeg">
<img src="images/WiproLake5.jpeg">

<p>
From the late 1990s onwards, Hyderabad's western expansion accelerated with the development of HITEC City and later the Financial District. At some point the lake became popularly known as "Wipro Lake" because of its proximity to the Wipro campus; a centuries-old water body is now identified through a corporate landmark. The soundscape never fully becomes "natural." Even when traffic quietens, it never disappears. The lake sounds like an ecosystem under negotiation. Even where the lake physically survives, the city extends into it acoustically.
What if sound is also a form of encroachment?
</p>

`;

});



// TEA TIME STALL

var teaTime = L.marker(
[17.424722, 78.340142],
{icon: teaIcon}
).addTo(map);

teaTime.bindTooltip("Tea Time Stall");

teaTime.on('click', function(){

map.flyTo([17.424722, 78.340142], 16);

document.getElementById('content').innerHTML = `

<h2>Tea Time Stall</h2>

<audio controls>
<source src="audio/TeaTimeStallmerged.mp3">
</audio>

<img src="images/teatimestall.png">

<p>
The tea stall exists because large developments rarely provide spaces for informal social life. Unlike nearby corporate buildings, the tea stall is not planned infrastructure. It emerged because people needed it.
Why do some of the smallest structures generate the most social activity? 
</p>

`;

});



// PRESTIGE HIGH FIELDS

var prestige = L.marker(
[17.414756, 78.336833],
{icon: constructionIcon}
).addTo(map);

prestige.bindTooltip("Prestige High Fields");

prestige.on('click', function(){

map.flyTo([17.414756, 78.336833], 16);

document.getElementById('content').innerHTML = `

<h2>Prestige High Fields Construction Site</h2>

<audio controls>
<source src="audio/PrestigeHighFieldsConstruction.mp3">
</audio>

<img src="images/PHFconstruction1.jpeg">
<img src="images/PHFconstruction2.jpeg">
<img src="images/PHFconstruction3.jpeg">
<img src="images/PHFoppconstruction.jpeg">

<p>
This site represents the future version of the district. Cranes, machinery, and labour are actively producing the next layer of the city. What makes the location interesting is not the construction itself, but the coexistence of construction sounds with buffalo grazing nearby. Two different ideas of land use occupy the same space simultaneously.</p>

`;

});



// GAUSHALA

var gaushala = L.marker(
[17.396917, 78.342200],
{icon: gaushalaIcon}
).addTo(map);

gaushala.bindTooltip("Sri Krishna Godavari Gaushala");

gaushala.on('click', function(){

map.flyTo([17.396917, 78.342200], 16);

document.getElementById('content').innerHTML = `

<h2>Sri Krishna Godavari Gaushala</h2>

<audio controls>
<source src="audio/SriKrishnaGodavariGaushala.mp3">
</audio>

<img src="images/SriKrishnaGodavariGaushala.jpeg">
<img src="images/SriKrishnaGodavariGaushala2.jpeg">


<p>
The gaushala appears almost disconnected from the surrounding Financial District. It represents a much older relationship between land, animals, religion, and community than the one driving contemporary urban development.
What forms of life become audible when development slows down? 
</p>

`;

});

// SONIC WALK ROUTE

L.Routing.control({
    waypoints: [
        L.latLng(17.396917, 78.342200), // Sri Krishna Godavari Gaushala
        L.latLng(17.414756, 78.336833), // Prestige High Fields
        L.latLng(17.424722, 78.340142), // Tea Time Stall
        L.latLng(17.424922, 78.342108), // Wipro Lake
        L.latLng(17.427228, 78.341653)  // Wipro Gate
    ],

    addWaypoints: false,
    draggableWaypoints: false,
    routeWhileDragging: false,
    fitSelectedRoutes: true,
    show: false,

    createMarker: function () {
        return null;
    },

  lineOptions: {
      styles: [{
          color: '#ff6600',
          opacity: 0.9,
          weight: 6,
          dashArray: '15,8'
      }]
  }

}).addTo(map);

</script>

</body>

</html>
