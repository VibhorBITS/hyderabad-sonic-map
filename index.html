<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Hyderabad Sonic Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
display:flex;
height:100vh;
font-family:Arial;
}

#map{
width:60%;
height:100%;
}

#sidebar{
width:40%;
padding:20px;
overflow-y:auto;
box-sizing:border-box;
}

img{
width:100%;
margin-bottom:10px;
border-radius:10px;
}

audio{
width:100%;
margin-bottom:20px;
}

</style>

</head>

<body>

<div id="map"></div>

<div id="sidebar">

<h2>Hyderabad Sonic Map</h2>

<p>
Click a marker to explore the location.
</p>

<div id="content"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([17.43,78.35], 13);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

</script>

</body>

</html>
